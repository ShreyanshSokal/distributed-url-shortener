services:
  postgres-url:
    image: postgres:16
    environment:
      POSTGRES_DB: url_shortener
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-url-data:/var/lib/postgresql/data

  postgres-analytics:
    image: postgres:16
    environment:
      POSTGRES_DB: url_analytics
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - postgres-analytics-data:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  kafka:
    image: apache/kafka:3.7.1
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENERS: PLAINTEXT://kafka:9092,CONTROLLER://kafka:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    volumes:
      - kafka-data:/var/lib/kafka/data

  zipkin:
    image: openzipkin/zipkin:3
    ports:
      - "9411:9411"

  discovery-service:
    build:
      context: .
      dockerfile: Dockerfile.discovery-service
    environment:
      EUREKA_SERVER_URL: http://discovery-service:8761/eureka
    ports:
      - "8761:8761"
    depends_on:
      - redis

  config-server:
    build:
      context: .
      dockerfile: Dockerfile.config-server
    environment:
      EUREKA_SERVER_URL: http://discovery-service:8761/eureka
    ports:
      - "8888:8888"
    depends_on:
      - discovery-service

  url-shortening-service:
    build:
      context: .
      dockerfile: Dockerfile.url-shortening-service
    environment:
      CONFIG_SERVER_URL: http://config-server:8888
      EUREKA_SERVER_URL: http://discovery-service:8761/eureka
      URL_DB_URL: jdbc:postgresql://postgres-url:5432/url_shortener
      URL_DB_USERNAME: postgres
      URL_DB_PASSWORD: postgres
      REDIS_HOST: redis
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      APP_BASE_URL: http://localhost:8080
    ports:
      - "8081:8081"
    depends_on:
      - config-server
      - postgres-url
      - redis
      - kafka

  redirect-service:
    build:
      context: .
      dockerfile: Dockerfile.redirect-service
    environment:
      CONFIG_SERVER_URL: http://config-server:8888
      EUREKA_SERVER_URL: http://discovery-service:8761/eureka
      REDIS_HOST: redis
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    ports:
      - "8082:8082"
    depends_on:
      - config-server
      - redis
      - kafka

  analytics-service:
    build:
      context: .
      dockerfile: Dockerfile.analytics-service
    environment:
      CONFIG_SERVER_URL: http://config-server:8888
      EUREKA_SERVER_URL: http://discovery-service:8761/eureka
      ANALYTICS_DB_URL: jdbc:postgresql://postgres-analytics:5432/url_analytics
      ANALYTICS_DB_USERNAME: postgres
      ANALYTICS_DB_PASSWORD: postgres
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    ports:
      - "8083:8083"
    depends_on:
      - config-server
      - postgres-analytics
      - kafka

  api-gateway:
    build:
      context: .
      dockerfile: Dockerfile.api-gateway
    environment:
      CONFIG_SERVER_URL: http://config-server:8888
      EUREKA_SERVER_URL: http://discovery-service:8761/eureka
      REDIS_HOST: redis
    ports:
      - "8080:8080"
    depends_on:
      - config-server
      - redis

volumes:
  postgres-url-data:
  postgres-analytics-data:
  kafka-data:
